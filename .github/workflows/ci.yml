name: CI
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
  pull-requests: write
jobs:
  ci:
    uses: MoeezTrusoft/erp-trusoft-k8s/.github/workflows/reusable-node-ci.yml@main
    with:
      gate-cmd: "gate:p1"
      build-contracts: true
    secrets: inherit
  ai-review:
    name: AI review (DeepSeek)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: MoeezTrusoft/erp-trusoft-k8s/.github/actions/ai-review@main
        with:
          api-key: ${{ secrets.AI_REVIEW_API_KEY }}
          base-url: ${{ vars.AI_REVIEW_BASE_URL || 'https://api.deepseek.com/v1' }}
          model: ${{ vars.AI_REVIEW_MODEL || 'deepseek-chat' }}
          blocking: ${{ vars.AI_REVIEW_BLOCKING || 'false' }}
